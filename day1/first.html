<!DOCTYPE html>   
<html lang="en">
<head>  
    <!-- starting tag -head -->
    <meta charset="UTF-8">   
    <!-- empty tag - meta,br,hr     <hr/> - self enclosing tag(starting and ending are same) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- container tag - title, head -->
</head>
<!-- ending tag - /head -->
<body>
    tag
    <br>
    element
    <br>
    attribute
    <hr width="75%">
    <h1 align="center">
        Welcome to Buddha
    </h1>
    <hr width="75%">
</body>
</html>
