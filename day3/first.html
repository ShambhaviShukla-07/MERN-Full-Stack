<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form action="" method="">
        <label for="stname">Student Name</label>
        <input type="text" name="stid" id="stname" placeholder="Enter your name">
        <br><br>
        <label for="pass" >Password</label>
        <input type="password" name="pid" id="pass" placeholder="Enter your password">
        <br><br>
        <label for="mail">E-Mail</label>
        <input type="email" name="eid" id="mail" placeholder="Enter your email">
        
    </form>
</body>
</html>
