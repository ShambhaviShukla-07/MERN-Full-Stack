<!DOCTYPE html>
<html>
<head>
    <title>Application Form</title>
</head>

<body bgcolor="#0B5D6B" text="white">

<center>
    <h1>Application Form</h1>
</center>

<form>
    <table align="center" cellpadding="10">

        <tr>
            <td><b>First Name:</b></td>
            <td><input type="text"></td>

            <td><b>Last Name:</b></td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td><b>Date of Birth:</b></td>
            <td><input type="date"></td>

            <td><b>Age:</b></td>
            <td><input type="number"></td>
        </tr>

        <tr>
            <td><b>Gender:</b></td>
            <td>
                <select>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </td>

            <td><b>Email Address:</b></td>
            <td>
                <input type="email" placeholder="Enter email address">
            </td>
        </tr>

        <tr>
            <td><b>Positions Available:</b></td>
            <td colspan="3">
                <input type="radio" name="position"> Junior Developer
                <input type="radio" name="position"> Mid-level Developer
                <input type="radio" name="position"> Senior Developer
            </td>
        </tr>

        <tr>
            <td><b>Programming Languages:</b></td>
            <td colspan="3">
                <input type="checkbox"> Java
                <input type="checkbox"> JavaScript
                <input type="checkbox"> Python
            </td>
        </tr>

        <tr>
            <td><b>Password:</b></td>
            <td><input type="password"></td>

            <td><b>Confirm Password:</b></td>
            <td><input type="password"></td>
        </tr>

        <tr>
            <td colspan="4" align="center">
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </td>
        </tr>

    </table>
</form>

</body>
</html>
